  text: 玄門報孝追薦儀壹十三
  hash: sha256:e1a72140a77501bb7ee82b621a43e402777b936651215fa22a3b61a18c094604
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0165_HFL_000-001a, image: hfl/0265/0265-116.png}
body:
  text: 自然朝行道師堂序立歩虚啓師恭以金眞演敎弘敷拔度之文玉冊垂科茂著昇遷之法存亡是頼幽顯均沾由是東極垂救苦之慈北魁置拔亡之局可使亡魂受度能令枯骨更生輒冐崇嚴俯垂鑑證恭惟玄中敎主諸大宗師幕下道貫三才心涵萬象隨方設敎應物流形爲生死之津梁作幽冥之主宰切念臣某浮黎小兆靈寳微生叨承無量之眞梯獲拜玄中之師範拯幽拔滯濟物利人臣今謹爲入意尚慮亡魂無邊苦爽自因宿世以至今生萬罪千愆陽非隂過罪旣違於青律名必記於黒書囚閉寒庭拘留幽獄若不皈投於玉陛焉能召到於皇壇徑仰叩於天威乞俯憐於幽滯拜貢素悃上瀆青玄請降恩光開明黒暗伏願眞慈汲引聖德矜容告符命於河源變劎樹而作瓊樹頒赤書於狴犴化刀山而爲寳山願垂照燭之慧光茂蕆慈悲之誓願煥明長夜輝映幽途庶俾亡魂均承道果脫重泉之報對登仙境以逍遥仰賜玄恩早垂昭報但臣下情不勝䖍禱之至領衆陞壇恭行典式唱道陞壇燒香頌各禮師存念如法玄隂七靈九炁合形魂精魄爽二景回輪飛光赫奕煥耀長春日月吐輝回合華英大梵流布奔飛火鈴魔王受事朝謁帝京含靈溥濟廣惠幽冥玉文敷告萬炁昇騰和與道合眞鳴法鼓二十四通無上三天玄元始三炁太上道君召出臣等身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十六人出出者嚴裝關啓靈壇土地里域眞官等神臣今正爾陞壇燒香行道謹奏爲入意其諸情悃已録上聞願得玉清道炁靈寳妙光流入臣等身中令臣所啓之誠速達徑御太上無極大道東極青玄慈父太一救苦天尊御前請稱法位具位臣某與弟子某謹同誠上啓太上無極大道虚無自然元始天尊太上道君靈寳天尊太上老君道德天尊髙上玉皇上帝句陳上宫天皇大帝中天紫微北極大帝東極青華大帝后土皇地祇十方已得道大聖衆至眞諸君丈人東華南極西靈北眞玄都玉京紫微上宫明皇道君上相上宰上保上傅三十六部尊經玄中大法師五帝三官四司九府九天天曹列位眞宰地府水司五嶽四瀆名山洞府神仙聖衆三界官屬一切威靈咸望洪慈俯垂洞鑑臣聞古之聖人蓋與天地合其德四時合其序大哉孝行至於日月爲之明王道爲之成蘭公得其說於斗眞諶毋傳其書於太史是故淨明之法本忠君孝親以存心盟眞之齋以報祖薦親而立敎以此見學仙之士曷嘗不䔍意於親謂滅其天常是特儒者自私之論若質諸道典豈知天眞大孝之心伏念臣某猥以凡材叨叅玄學奉經科而開化佩戒律以焚修離形去智同大通雖有取顔淵之語愼終追逺則歸厚常思廣曽子之言屬同門志切於薦親爲祭酒義當於領奏陟降在左右幸曕帝眞穆穆之光孝悌通神明諒鑑人子區區之請旣承詞㫖敢不上聞宣詞按如詞言備殫懇欵仰祈大道俯鑑小心臣聞民生於三事之如一道出於一敎分於三故資事父以事君則忠孝之義盡取於治身而治國則清淨之化成其在棲眞者流尤以報君爲重是以九眞妙戒以敬勤爲入德之門三籙本科以焚修爲祝𨤲之意敎所由來逺矣學者所冝則之以今陞壇行道請法衆等運茲初捻上香願此香煙騰空徑上供養無上至眞道寳臣等首體投地皈命太上三尊十方衆聖以是功德上祝皇帝聖壽萬安伏願道叅玄聖德配皇天眷命有德者昌宗社衍萬年之慶無爲而民自化華夷歸一綂之中今故燒香自皈依道尊大聖衆至眞之德得道之後和保天長存臣聞人本乎祖孝始於親自禮經而言除七廟二祧餘不在烝嘗之列以道書而論則億曽萬祖猶應在薦拔之科蓋有先亡未受度而不得仙亦有前世不祀祖而猶爲罪是故女青禁典中存抜贖之文靈寳本章首列追度之品凡道士修眞此爲先務故天尊設敎具有明文以今陞壇行道請法衆等運兹二捻上香願此香煙騰空徑上供養無上至眞經寳臣等首體投地仰依太上三尊十方衆聖願以是功德歸流報孝弟子某道俗二門玄祖上世先靈俾沐善功俱超仙界伏願三境下雞竿之詔九幽承龍簡之恩縁本思舊宗早拔籍於泉曲之府混化歸元一即遷神於朱火之宫今故燒香自皈依經尊大聖衆至眞之德得道之後和昇入無形臣聞廣大精微君子之道可傳也劬勞鞠育父母之恩莫重焉凡有血氣者且知用其情豈思道德者而可忘其本蓋有生未伸於滎養死尤切於追資王尊師依玉皇本行以薦親卒如其志莫氏子誦青霄隱書而拔毋果獲其成仰前哲之耿光冝後人之明鑑以今陞壇行道請法衆等運茲三捻上香願此香煙騰空徑上供養無上至眞師寳臣等首體投地仰依太上三尊十方衆聖願以是功德徑爲弟子某拔度所薦亡者某神魂出離冥途上昇仙境伏願乗三化五鍊之功出九夜重隂之苦服飛根而生玉液早遊神大渺之堂咀靈芝而漱金泉即飛歩洞陽之館今故燒香自皈依師尊大聖衆至眞之德得道之後和昇入無形禮方各長跪懴悔臣等伏聞太史昇仙傳九幽明眞之典天師得道留三八謝罪之科非秖徒薦拔於先亡特所以發明於孝道伏念亡者某浮生若夢大患有身六塵徧染三業縈纒滋生罪垢五藴非眞四大假合動渉塵縁顚連於是非物我之途流轉於情慾愛僧之地心生口語日積月深衡鑑無私固莫逃於考覈幽明異致亦難憶其升沉以今報孝弟子某㓜師道德之風未報劬勞之德倘先靈之未度將此念以何安庸奉玄科以資冥福謹齎香花燈燭法信供養之儀皈命太上無極大道十方靈寳天尊十方救苦天尊十郷神仙諸靈官伏願天恩昭曠宇量含洪念先親汨没於世縁未能自拔凡平生詿誤於憲網咸與維新俾脫籍於幽關早化形於丹界然願存亡兩世俱逢天開地闢之時道俗二門均囿日照月臨之下懴謝之後昇入無形命魔歩虚三啓頌三禮重稱法位具位臣某等重誠上啓三清四梵八極九霄紫闕黃房雲宫星府至眞至大無極無窮三界髙眞玄壇衆聖咸望洪慈俯垂洞鑑伏念臣等樗櫟散材醯雞小見栖遲玄宇雖知讀黄老之書傳習齋科豈盡得陸張之意但以盟心於利濟輒忘越分以行持惟三綱五常乃立人之大本而九幽十類皆失道之窮魂爰謹薦揚庶期開度以今奉爲某懴悔亡故某及祖宗父母九幽長夜一切苦魂雖厠處於人倫自汨沉於天理惟五敎之有親有義有别有序有信雖曰有常犯六刑之不孝不弟不睦不婣不任至於不恤居上無道爲下不忠禮義廉恥之俗微放僻邪侈之習勝迷迷不覺一旦花殘銀海而氣斷玉樓戀戀相牽萬劫足履刀山而手攀劒樹以今弟子某求啓紫微之祕特修玉匱之科驛簡通幽龍童效信仰惟大造特霈殊恩神光所燭而無隱不通惠澤所加而何𡨚不釋拔出地戸不爲地獄之沈囚朝禮天顔俱到天尊之法㑹然願乾坤交泰日月貞明海宇承平俱在八荒之壽域天人受度獲登無上之至眞至於神虎官君龍符驛吏承流宣化俱有開通冥道之勞崇德報功冝在遷轉仙階之列上祈天尊大慈之化下副臣等皈告之誠謹啓以聞發願一願元始符命二願幽夜開光三願金籙度命四願黒簿除愆五願苦海息浪六願火獄沈煙七願怡神快樂八願解釋𡨚牽九願聞經悟道十願進品仙階十一願酆都罷對十二願學道成仙存神燒香香官使者左右龍虎君侍香諸靈官當令臣行道朝修之所自然生金液丹碧芝英百靈衆眞交㑹在此香火爐前當願亡魂受度弟子蒙恩十方仙童玉女接侍蘭煙傳臣向來所啓之誠速達徑詣太上無極大道東極青玄慈父太一救苦天尊御前出堂頌下壇謝師天門九重開式展朝元之禮地獄五苦解均承度命之功謹扣謁於師垣特恭伸於謝悃臣某適來謹爲報孝弟子某恭依敎典宣闡朝儀慮有犯於繩規恐難逃於斧鉞仰祈慈造俯賜矝容伏願金符度命而九地皆春丹簡宣恩而諸囚罷對亡爽悉超於道岸永證逍遥玄門茂振於宗風均沾化育臣干冐崇嚴下情不勝恭謝之至回向設醮謝恩歩虚灑淨宣衞靈呪請稱法位具位臣某等同誠上啓列聖咸望洪慈洞回昭鑑臣聞道者羣心之用物莫能違孝爲百行之先人當自勉惟父母之功莫大與乾坤之造同符是故諶毋蕆敎於黄堂先明孝道玄帝傳經於玉篋具述報恩豈徒養生䘮死之盡情亦欲積行修縁而入妙蘇仙留橘井與慈母以立功眞武宴谷巖爲二親而修果以此見人倫之大最爲學道者之先伏念今時報孝弟子某寄跡法中違離膝下奉甘食美服以養其口體旣不能盡世俗之孝心求竒方妙藥以延其壽年又安得如太平之經訓念捐世之太早莫殺身以相從履霜露以興懷望松楸而掩淚歳月逝矣不知魂魄以何依夢𥧌見之宛若音容而相接爰修道果少福冥途然燈燒香按玉匱盟眞之典陶魂鑄魄行紫樞飛梵之科幸法事之告成諒靈光之響答伏願皇皇大道赫赫髙眞俯憐至隱之情特廣好生之德九龍傳驛風雷渙汗於幽都萬犴停刑雨露昭蘇於罪爽俾魂神之超度獲時刻之昇遷九祖生天庶不負出家之意一心慕道敢忘加修已之功臣等下情不勝凝俟之至請班降聖宣詞臣聞天雖髙而聽甚卑惟誠能動子欲養而親不待從古皆然故曽參有三釜之悲而文正懷一衾之恨以賢者尚篤此事豈方外獨無是心未能盡養於生前必抱遺哀於身後幸天尊垂玉匱拔亡之典使人子伸昊天罔極之情比之廬墓以終身執䘮過禮效乎刻木以爲象事亡如存論孝忱則有之皆無益於死者豈若緑章封事陳哀悃於帝前白簡飛符拔死魂於地下旣鬼有所歸矣於人獨無恔乎乃知道敎之垂科能濟禮經之不及伏念報孝弟子某自憐薄命少遭閔凶鞠育劬勞其何能報焄蒿悽愴徒切于懷爰修鍊度之科少益幽冥之福荷眞斿之委鑑設清醮以謝恩伏願帝度其心天從所欲念先親積德而未食其報憫微臣思孝而莫致其情特頒渙汗之恩一洗沈冥之苦庶令逝魄早脫幽關玉眸鍊質黃華蕩形即化形於丹界緑字返生金房度命獲飛歩於上清蛻質登眞轉輪得道臣等致恭上香謹陳亞獻宣進狀臣聞乾元坤元乃人元之資始父相母相即我相之肇基生生不窮念念相續艱難苦惱縁茲而后有長育顧復何思之能酧至人達道本原大意識眞父母滅貪嗔除險峻所以報恩空結習割愛情自然去累使有相歸於無相號眞空而實不空是爲入解脫門可以到逍遥境伏念亡故某覊縻世網汨没妄縁慾海愛河易縱無明之性電光石火難留觀化之身命奄泉扄名登鬼録顧九結十纒之未淨在三途五苦以何逃念當年遣子以出家固其心之有托在今日濟幽而拔苦諒我道之垂憐伏願特推錫類之恩丕廣度人之德勑陶公仙伯以校籍命韓君司馬以度魂庶今亡者某受事朱宫書名黄籙一百八十煩惱業障俱消八萬四千塵勞妄縁都盡永辤苦趣頓入仙宗從茲出入於六虚不復輪迴於三界然願弟子某賞延先世師資宗祖以同昇裕及後昆道俗眷縁而迪吉學仙有遇進道無魔正妙通妙顯言有修誓不負報恩之訓始相我相悉歸無着願早登眞一之門臣等致恭上香酒陳終獻宣䟽送神臣聞道非可象散則成炁聚則成形神本無方聽之不聞視之不見惟精神之黙感則陟降之如存適舉朝儀今當拜送伏想三清上聖遊神寥廓之郷九地冥官復職幽隂之境倐忽不知其所在彷徨恨莫以相從臣某等骨肉行尸塵泥賤品叨逢道化備在眞階或俯仰之失儀或歩趨之失節存奏昧飛神之法書符違按筆之規仰祈棄過以録功庶免因齋而獲罪德何以報當益勵於焚修威不違顔願常蒙於賜對臣等下情不勝攀戀之至瞻望霄衢一心拜送回軿頌送出化財玄門報孝追薦儀
